<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Philidor Chess Academy</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#15203b;--ink-soft:#5a6478;--cream:#f6f2e9;--paper:#fff;--gold:#bf9b54;--gold-bright:#d8b76a;
    --line:rgba(21,32,59,.12);--danger:#c0392b;--ok:#2e7d52;--shadow:0 24px 60px -28px rgba(12,19,34,.45)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:"Hanken Grotesk",sans-serif;font-size:17px;line-height:1.6;
    min-height:100svh;display:flex;align-items:center;justify-content:center;padding:30px;
    background:radial-gradient(120% 90% at 12% 8%,rgba(184,236,223,.5),transparent 55%),
      radial-gradient(120% 90% at 92% 22%,rgba(231,207,226,.5),transparent 55%),var(--cream)}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:1.7rem;margin-bottom:.3em;letter-spacing:-.01em}
  .card{width:min(440px,94vw);background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:34px 30px;box-shadow:var(--shadow)}
  .sub{color:var(--ink-soft);font-size:.95rem;margin-bottom:22px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:.78rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  .field input{width:100%;padding:.85em 1em;border:1px solid var(--line);border-radius:12px;background:var(--cream);font-family:inherit;font-size:1rem;color:var(--ink)}
  .field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(191,155,84,.18)}
  .btn{width:100%;background:var(--ink);color:var(--cream);font-family:inherit;font-weight:600;font-size:1rem;padding:.95em;border:none;border-radius:999px;cursor:pointer;transition:.2s;margin-top:6px}
  .btn:hover{transform:translateY(-2px);box-shadow:0 14px 28px -14px rgba(12,19,34,.6)}
  .btn[disabled]{opacity:.6;cursor:not-allowed;transform:none}
  .msg{margin-top:16px;padding:.8em 1em;border-radius:12px;font-size:.9rem;display:none}
  .msg.show{display:block}
  .msg.err{background:rgba(192,57,43,.1);color:var(--danger);border:1px solid rgba(192,57,43,.25)}
  .msg.ok{background:rgba(46,125,82,.1);color:var(--ok);border:1px solid rgba(46,125,82,.25)}
  .muted{font-size:.86rem;color:var(--ink-soft);text-align:center;margin-top:18px}
  .muted a{color:var(--gold);font-weight:600}
  .hidden{display:none!important}
</style>
</head>
<body>
  <div class="card">
    <h1>Set a new password</h1>
    <p class="sub" id="sub">Choose a new password for your parent account.</p>

    <form id="resetForm" class="hidden">
      <div class="field">
        <label for="p1">New password (min 8 characters)</label>
        <input id="p1" type="password" autocomplete="new-password" minlength="8" required placeholder="••••••••">
      </div>
      <div class="field">
        <label for="p2">Confirm new password</label>
        <input id="p2" type="password" autocomplete="new-password" minlength="8" required placeholder="••••••••">
      </div>
      <button class="btn" type="submit">Update password</button>
    </form>

    <div id="msg" class="msg"></div>
    <p class="muted"><a href="parent-login.html">Back to sign in</a></p>
  </div>

<script src="js/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (function () {
    var byId = function (id) { return document.getElementById(id); };
    var msg = byId('msg'), form = byId('resetForm'), sub = byId('sub');
    function show(t, k) { msg.textContent = t; msg.className = 'msg show ' + k; }

    var configured = window.SUPABASE_URL && window.SUPABASE_URL.indexOf('YOUR-PROJECT') === -1;
    if (!configured || !window.supabase || !window.supabase.createClient) {
      show('Portal not connected. Please try again later.', 'err'); return;
    }
    var client = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    var ready = false;
    function enable() { if (ready) return; ready = true; form.classList.remove('hidden'); sub.textContent = 'Choose a new password for your parent account.'; }

    // The recovery link puts a session in the URL; supabase-js parses it
    // and fires PASSWORD_RECOVERY. Also check any existing session.
    client.auth.onAuthStateChange(function (event) {
      if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') enable();
    });
    client.auth.getSession().then(function (r) {
      if (r.data && r.data.session) enable();
      else setTimeout(function () {
        if (!ready) show('This reset link is invalid or has expired. Request a new one from the sign-in page.', 'err');
      }, 2500);
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var p1 = byId('p1').value, p2 = byId('p2').value;
      if (p1 !== p2) { show('The two passwords do not match.', 'err'); return; }
      var btn = form.querySelector('button'); btn.disabled = true; msg.className = 'msg';
      client.auth.updateUser({ password: p1 }).then(function (r) {
        btn.disabled = false;
        if (r.error) { show(r.error.message, 'err'); return; }
        show('Password updated! Redirecting to sign in…', 'ok');
        client.auth.signOut().then(function () {
          setTimeout(function () { window.location.href = 'parent-login.html'; }, 1600);
        });
      });
    });
  })();
</script>
</body>
</html>
